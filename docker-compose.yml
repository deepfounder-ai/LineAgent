# lineagent — one-command local stack.
#
#   docker compose up -d           # build + run, data persisted in a volume
#   docker compose logs -f         # follow logs
#   docker compose down            # stop (keeps the volume)
#
# Override the published image instead of building from source:
#   LINEAGENT_IMAGE=ghcr.io/kir/lineagent:latest docker compose up -d

services:
  lineagent:
    image: ${LINEAGENT_IMAGE:-lineagent:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lineagent
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    environment:
      LINEAGENT_HOST: 0.0.0.0
      LINEAGENT_PORT: 3000
      LINEAGENT_DATA_DIR: /data
      LINEAGENT_LOG: ${LINEAGENT_LOG:-info}
    volumes:
      - lineagent_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  lineagent_data:
